<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Abid Shoes — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);padding:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:12px;color:#93c5fd;margin-top:2px}
.login-box{max-width:400px;margin:60px auto;padding:24px;background:#1e293b;border-radius:16px}
.login-box h2{text-align:center;margin-bottom:20px;color:#60a5fa}
input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:16px;margin-bottom:12px}
.btn{width:100%;padding:14px;background:#1d4ed8;border:none;border-radius:8px;color:white;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{background:#1e40af}
.nav{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;position:sticky;top:60px;z-index:99}
.nav-btn{padding:12px 16px;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.nav-btn.active{color:#60a5fa;border-bottom-color:#60a5fa}
.content{padding:16px;max-width:800px;margin:0 auto}
.card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;color:#94a3b8;margin-bottom:8px}
.card-value{font-size:28px;font-weight:700;color:#60a5fa}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.branch-btn{padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;cursor:pointer;text-align:center}
.branch-btn.active{background:#1d4ed8;border-color:#3b82f6}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:#0f172a;padding:10px 8px;text-align:left;color:#94a3b8;font-weight:500}
.table td{padding:10px 8px;border-bottom:1px solid #1e293b}
.table tr:hover td{background:#1e293b}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#064e3b;color:#34d399}
.badge-yellow{background:#451a03;color:#fbbf24}
.badge-red{background:#450a0a;color:#f87171}
.profit{color:#34d399}
.loss{color:#f87171}
.section-title{font-size:16px;font-weight:600;margin:16px 0 8px;color:#e2e8f0}
.search-bar{width:100%;padding:10px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:#64748b}
.error{background:#450a0a;color:#fca5a5;padding:12px;border-radius:8px;margin:8px 0;font-size:13px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="header"><h1>🔐 Abid Shoes Admin</h1><p>5 Branch POS — Mobile Dashboard</p></div>
  <div class="login-box">
    <h2>Login</h2>
    <input type="password" id="pwd-input" placeholder="Admin Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Login →</button>
    <div id="login-err" style="color:#f87171;text-align:center;margin-top:10px;font-size:13px"></div>
  </div>
</div>
<div id="main-screen" style="display:none">
  <div class="header">
    <h1>👟 Abid Shoes Admin</h1>
    <p id="sync-time">Loading...</p>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showTab('sales')">💰 Sales</button>
    <button class="nav-btn" onclick="showTab('stock')">📦 Stock</button>
    <button class="nav-btn" onclick="showTab('orders')">🌐 Orders</button>
  </div>
  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-sales" style="display:none"></div>
    <div id="tab-stock" style="display:none"></div>
    <div id="tab-orders" style="display:none"></div>
  </div>
</div>
<script>
const API = 'https://web-production-e8b2a.up.railway.app';
const KEY = 'abidshoes2024secret';
let selectedBranch = '';
let allBranches = [];

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === KEY || pwd === 'abidshoes2024secret') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('login-err').textContent = 'Wrong password!';
  }
}

async function apiFetch(endpoint) {
  const r = await fetch(`${API}${endpoint}?key=${KEY}`);
  return r.json();
}

function showTab(tab) {
  ['dashboard','sales','stock','orders'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['dashboard','sales','stock','orders'][i]===tab);
  });
  if (tab==='sales') loadSales();
  if (tab==='stock') loadStock();
  if (tab==='orders') loadOrders();
}

function Rs(n) { return 'Rs.' + Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0}); }

async function loadDashboard() {
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/admin/dashboard');
    const today = data.today || [];
    const monthly = data.monthly || [];
    allBranches = [...new Set([...today,...monthly].map(r=>r.branch_name))];
    let todaySales=0, todayProfit=0, todayInv=0;
    today.forEach(r=>{ todaySales+=r.sales||0; todayProfit+=r.profit||0; todayInv+=r.invoices||0; });
    let monSales=0, monProfit=0;
    monthly.forEach(r=>{ monSales+=r.sales||0; monProfit+=r.profit||0; });
    el.innerHTML = `
      <p style="font-size:11px;color:#64748b;text-align:right;margin-bottom:8px">Last sync: ${data.monthly[0]?.last_sync||'--'}</p>
      <div class="section-title">📅 Aaj ka</div>
      <div class="grid-3">
        <div class="card"><div class="card-title">Sales</div><div class="card-value" style="font-size:20px">${Rs(todaySales)}</div></div>
        <div class="card"><div class="card-title">Profit</div><div class="card-value profit" style="font-size:20px">${Rs(todayProfit)}</div></div>
        <div class="card"><div class="card-title">Invoices</div><div class="card-value" style="font-size:20px">${todayInv}</div></div>
      </div>
      <div class="section-title">📆 Ye Mahina</div>
      <div class="grid-2">
        <div class="card"><div class="card-title">Total Sales</div><div class="card-value">${Rs(monSales)}</div></div>
        <div class="card"><div class="card-title">Total Profit</div><div class="card-value profit">${Rs(monProfit)}</div></div>
      </div>
      <div class="card"><div class="card-title">🌐 Pending Web Orders</div><div class="card-value">${data.pending_orders||0}</div></div>
      <div class="section-title">🏪 Branches — Aaj</div>
      ${today.map(r=>`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600">${r.branch_name}</span>
            <span class="badge badge-green">${r.invoices} invoices</span>
          </div>
          <div class="grid-3" style="margin-top:10px">
            <div><div class="card-title">Sales</div><div style="color:#60a5fa;font-weight:600">${Rs(r.sales)}</div></div>
            <div><div class="card-title">Profit</div><div class="profit" style="font-weight:600">${Rs(r.profit)}</div></div>
            <div><div class="card-title">Returns</div><div class="loss" style="font-weight:600">${Rs(r.returns)}</div></div>
          </div>
        </div>
      `).join('')}
    `;
  } catch(e) {
    el.innerHTML = `<div class="error">Data load nahi hua.<br>${e.message}</div>`;
  }
}

async function loadSales() {
  const el = document.getElementById('tab-sales');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/admin/sales');
    const byDate = {};
    data.forEach(r => { if (!byDate[r.date]) byDate[r.date] = []; byDate[r.date].push(r); });
    const dates = Object.keys(byDate).sort().reverse();
    // Grand total
    const allFiltered = data;
    const gTotal = allFiltered.reduce((s,r)=>s+(r.total_sales||0),0);
    const gRet   = allFiltered.reduce((s,r)=>s+(r.total_returns||0),0);
    const gNet   = Math.max(0, gTotal - gRet);
    const gProfit= allFiltered.reduce((s,r)=>s+(r.total_profit||0),0);
    const gInv   = allFiltered.reduce((s,r)=>s+(r.invoice_count||0),0);

    el.innerHTML = '<div class="section-title">💰 Sales — Last 30 Days</div>'
      + '<div style="display:flex;justify-content:space-between;background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px">'
      + '<div style="text-align:center"><div style="font-size:11px;color:#64748b">Net Sales</div><div style="color:#60a5fa;font-weight:700">'+Rs(gNet)+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:11px;color:#64748b">Profit</div><div style="color:#34d399;font-weight:700">'+Rs(gProfit)+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:11px;color:#64748b">Invoices</div><div style="font-weight:700">'+gInv+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:11px;color:#64748b">Returns</div><div style="color:#f87171;font-weight:700">'+Rs(gRet)+'</div></div>'
      + '</div>'
      + dates.slice(0,30).map(date => {
        const rows = byDate[date];
        const gross = rows.reduce((s,r)=>s+(r.total_sales||0),0);
        const ret   = rows.reduce((s,r)=>s+(r.total_returns||0),0);
        const total = Math.max(0, gross - ret);
        const profit = rows.reduce((s,r)=>s+(r.total_profit||0),0);
        const blines = rows.map(r=>'<div style="font-size:12px;color:#64748b;margin-top:4px">'+r.branch_name+': '+Rs(r.total_sales)+' | '+r.invoice_count+' invoices</div>').join('');
        return '<div class="card"><div style="display:flex;justify-content:space-between"><span style="font-weight:600">'+date+'</span><span class="profit" style="font-weight:700">'+Rs(profit)+' profit</span></div><div style="color:#60a5fa;margin:4px 0">'+Rs(total)+' net sale</div>'+blines+'</div>';
      }).join('');
  } catch(e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadStock() {
  const el = document.getElementById('tab-stock');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/admin/stock');
    const branches = [...new Set(data.map(r=>r.branch_name))];
    let activeBranch = branches[0]||'';

    function renderStockItems(items) {
      if (!items.length) return '<div class="loading">Koi item nahi</div>';
      let rows = '';
      items.forEach(r => {
        const badge = r.stock<5?'badge-red':r.stock<20?'badge-yellow':'badge-green';
        rows += '<tr><td><div style="font-weight:500">'+r.name+'</div><div style="font-size:11px;color:#64748b">'+(r.brand||'')+' | '+(r.category||'')+'</div></td>'
              + '<td><span class="badge '+badge+'">'+r.stock+'</span></td>'
              + '<td>'+Rs(r.price)+'</td></tr>';
      });
      return '<table class="table"><tr><th>Item</th><th>Stock</th><th>Price</th></tr>'+rows+'</table>';
    }

    function renderTotal(items) {
      const tp = items.reduce((s,r)=>s+(r.stock||0),0);
      const tv = items.reduce((s,r)=>s+(r.stock||0)*(r.price||0),0);
      return '<div style="display:flex;justify-content:space-between;background:#0f172a;border-radius:10px;padding:12px;margin-bottom:10px">'
        +'<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">Total Pairs</div><div style="color:#60a5fa;font-weight:700;font-size:22px">'+tp+'</div></div>'
        +'<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">Total Value</div><div style="color:#34d399;font-weight:700;font-size:22px">'+Rs(tv)+'</div></div>'
        +'</div>';
    }

    function render(branch) {
      activeBranch = branch;
      const items = data.filter(r=>r.branch_name===branch);
      const btnHtml = branches.map(b=>'<button class="branch-btn'+(b===activeBranch?' active':'')+'" onclick="stockSwitch(\''+ b +'\')">'+b+'</button>').join('');
      el.innerHTML = '<div class="section-title">📦 Stock</div>'
        +'<div id="sbranch-btns" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+btnHtml+'</div>'
        +'<div id="stock-total">'+renderTotal(items)+'</div>'
        +'<input class="search-bar" placeholder="Search..." oninput="stockSearch(this.value)">'
        +'<div id="stock-list">'+renderStockItems(items)+'</div>';
    }

    window.stockSwitch = function(branch) {
      activeBranch = branch;
      document.querySelectorAll('#sbranch-btns .branch-btn').forEach(b=>b.classList.toggle('active',b.textContent===branch));
      const items = data.filter(r=>r.branch_name===branch);
      document.getElementById('stock-total').innerHTML = renderTotal(items);
      document.getElementById('stock-list').innerHTML = renderStockItems(items);
    };

    window.stockSearch = function(q) {
      const items = data.filter(r=>r.branch_name===activeBranch &&
        (r.name.toLowerCase().includes(q.toLowerCase()) ||
         (r.brand||'').toLowerCase().includes(q.toLowerCase())));
      document.getElementById('stock-total').innerHTML = renderTotal(items);
      document.getElementById('stock-list').innerHTML = renderStockItems(items);
    };

    render(activeBranch);
  } catch(e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadOrders() {
  const el = document.getElementById('tab-orders');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/orders/list');
    let html = `<div class="section-title">🌐 Web Orders (${data.length})</div>`;
    data.forEach(r => {
      const sc = r.status==='Delivered'?'badge-green':r.status==='Pending'?'badge-yellow':'badge-red';
      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:#94a3b8">${r.order_no}</span>
          <span class="badge ${sc}">${r.status}</span>
        </div>
        <div style="font-weight:600;margin:6px 0">${r.customer_name||'--'}</div>
        <div style="font-size:13px;color:#94a3b8">${r.customer_phone||''} | ${r.city||''}</div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <span style="color:#60a5fa;font-weight:600">${Rs(r.total)}</span>
          <span style="font-size:12px;color:#64748b">${r.payment_method||'COD'}</span>
        </div></div>`;
    });
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}
</script>
</body>
</html>
