<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Abid Shoes — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);padding:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:12px;color:#93c5fd;margin-top:2px}
.login-box{max-width:400px;margin:60px auto;padding:24px;background:#1e293b;border-radius:16px}
.login-box h2{text-align:center;margin-bottom:20px;color:#60a5fa}
input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:16px;margin-bottom:12px}
.btn{width:100%;padding:14px;background:#1d4ed8;border:none;border-radius:8px;color:white;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{background:#1e40af}
.nav{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto;position:sticky;top:60px;z-index:99}
.nav-btn{padding:12px 16px;background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.nav-btn.active{color:#60a5fa;border-bottom-color:#60a5fa}
.content{padding:16px;max-width:800px;margin:0 auto}
.card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;color:#94a3b8;margin-bottom:8px}
.card-value{font-size:28px;font-weight:700;color:#60a5fa}
.card-sub{font-size:12px;color:#64748b;margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.branch-btn{padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;cursor:pointer;text-align:center}
.branch-btn.active{background:#1d4ed8;border-color:#3b82f6}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:#0f172a;padding:10px 8px;text-align:left;color:#94a3b8;font-weight:500}
.table td{padding:10px 8px;border-bottom:1px solid #1e293b}
.table tr:hover td{background:#1e293b}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#064e3b;color:#34d399}
.badge-yellow{background:#451a03;color:#fbbf24}
.badge-red{background:#450a0a;color:#f87171}
.profit{color:#34d399}
.loss{color:#f87171}
.section-title{font-size:16px;font-weight:600;margin:16px 0 8px;color:#e2e8f0}
.search-bar{width:100%;padding:10px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;margin-bottom:12px}
.last-sync{font-size:11px;color:#64748b;text-align:right;margin-bottom:8px}
.loading{text-align:center;padding:40px;color:#64748b}
.error{background:#450a0a;color:#fca5a5;padding:12px;border-radius:8px;margin:8px 0;font-size:13px}
.date-filter{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px}
.date-filter label{font-size:12px;color:#94a3b8;display:block;margin-bottom:4px}
.date-filter input[type=date]{padding:8px 10px;font-size:14px;margin-bottom:8px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;width:100%}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{padding:7px 12px;background:#0f172a;border:1px solid #334155;border-radius:20px;color:#94a3b8;font-size:12px;cursor:pointer}
.fbtn.active{background:#1d4ed8;border-color:#3b82f6;color:white}
.apply-btn{width:100%;padding:10px;background:#1d4ed8;border:none;border-radius:8px;color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.summary-bar{background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div id="login-screen">
  <div class="header"><h1>🔐 Abid Shoes Admin</h1><p>5 Branch POS — Mobile Dashboard</p></div>
  <div class="login-box">
    <h2>Login</h2>
    <input type="password" id="pwd-input" placeholder="Admin Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Login →</button>
    <div id="login-err" style="color:#f87171;text-align:center;margin-top:10px;font-size:13px"></div>
  </div>
</div>

<div id="main-screen" style="display:none">
  <div class="header">
    <h1>👟 Abid Shoes Admin</h1>
    <p id="sync-time">Loading...</p>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showTab('sales')">💰 Sales</button>
    <button class="nav-btn" onclick="showTab('stock')">📦 Stock</button>
    <button class="nav-btn" onclick="showTab('orders')">🌐 Orders</button>
  </div>
  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-sales" style="display:none"></div>
    <div id="tab-stock" style="display:none"></div>
    <div id="tab-orders" style="display:none"></div>
  </div>
</div>

<script>
const API = 'https://web-production-e8b2a.up.railway.app';
const KEY = 'abidshoes2024secret';
let allSalesData = [];

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === KEY || pwd === 'abidshoes2024secret') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('login-err').textContent = 'Wrong password!';
  }
}

async function apiFetch(endpoint) {
  const r = await fetch(`${API}${endpoint}?key=${KEY}`);
  return r.json();
}

function showTab(tab) {
  ['dashboard','sales','stock','orders'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['dashboard','sales','stock','orders'][i]===tab);
  });
  if (tab==='sales') loadSales();
  if (tab==='stock') loadStock();
  if (tab==='orders') loadOrders();
}

function Rs(n) { return 'Rs.' + Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0}); }

function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function daysAgoStr(n) {
  const d = new Date(); d.setDate(d.getDate()-n);
  return d.toISOString().split('T')[0];
}
function monthStartStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}

async function loadDashboard() {
  const el = document.getElementById('tab-dashboard');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/admin/dashboard');
    const today = data.today || [];
    const monthly = data.monthly || [];

    let todaySales=0, todayProfit=0, todayInv=0;
    today.forEach(r=>{ todaySales+=r.sales||0; todayProfit+=r.profit||0; todayInv+=r.invoices||0; });

    let monSales=0, monProfit=0;
    monthly.forEach(r=>{ monSales+=r.sales||0; monProfit+=r.profit||0; });

    document.getElementById('sync-time').textContent = 'Last sync: ' + (data.monthly[0]?.last_sync||'--');

    el.innerHTML = `
      <div class="section-title">📅 Aaj ka</div>
      <div class="grid-3">
        <div class="card"><div class="card-title">Sales</div><div class="card-value" style="font-size:20px">${Rs(todaySales)}</div></div>
        <div class="card"><div class="card-title">Profit</div><div class="card-value profit" style="font-size:20px">${Rs(todayProfit)}</div></div>
        <div class="card"><div class="card-title">Invoices</div><div class="card-value" style="font-size:20px">${todayInv}</div></div>
      </div>
      <div class="section-title">📆 Ye Mahina</div>
      <div class="grid-2">
        <div class="card"><div class="card-title">Total Sales</div><div class="card-value">${Rs(monSales)}</div></div>
        <div class="card"><div class="card-title">Total Profit</div><div class="card-value profit">${Rs(monProfit)}</div></div>
      </div>
      <div class="card"><div class="card-title">🌐 Pending Web Orders</div><div class="card-value">${data.pending_orders||0}</div></div>
      <div class="section-title">🏪 Branches — Aaj</div>
      ${today.map(r=>`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span style="font-weight:600">${r.branch_name}</span>
            <span class="badge badge-green">${r.invoices} invoices</span>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">🛍 RETAIL</div>
          <div class="grid-3" style="margin-bottom:10px">
            <div><div class="card-title">Sale</div><div style="color:#60a5fa;font-weight:600">${Rs((r.r_sales||0)+(r.r_returns||0))}</div></div>
            <div><div class="card-title">Net Sale</div><div style="color:#60a5fa;font-weight:600">${Rs(r.r_sales||0)}</div></div>
            <div><div class="card-title">Returns</div><div class="loss" style="font-weight:600">${Rs(r.r_returns||0)}</div></div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
            <div><div class="card-title">Profit</div><div class="profit" style="font-weight:600">${Rs(r.r_profit||0)}</div></div>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">🏭 WHOLESALE</div>
          <div class="grid-3">
            <div><div class="card-title">Sale</div><div style="color:#60a5fa;font-weight:600">${Rs((r.ws_sales||0)+(r.ws_returns||0))}</div></div>
            <div><div class="card-title">Net Sale</div><div style="color:#60a5fa;font-weight:600">${Rs(r.ws_sales||0)}</div></div>
            <div><div class="card-title">Returns</div><div class="loss" style="font-weight:600">${Rs(r.ws_returns||0)}</div></div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:6px">
            <div><div class="card-title">Profit</div><div class="profit" style="font-weight:600">${Rs(r.ws_profit||0)}</div></div>
          </div>
        </div>
      `).join('')}
    `;
  } catch(e) {
    el.innerHTML = `<div class="error">Data load nahi hua.<br>${e.message}</div>`;
  }
}

async function loadSales() {
  const el = document.getElementById('tab-sales');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    allSalesData = await apiFetch('/api/admin/sales');
    renderSalesUI();
  } catch(e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

let activeSalesBranch = 'ALL';

window.setSalesBranch = function(b) {
  activeSalesBranch = b;
  document.querySelectorAll('.sbranch-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.b===b));
  applySalesFilter();
};

function renderSalesUI() {
  const el = document.getElementById('tab-sales');
  const today = todayStr();
  const mStart = monthStartStr();
  const branchList = [...new Set(allSalesData.map(r=>r.branch_name))].sort();

  el.innerHTML = `
    <div class="section-title">💰 Sales</div>
    <div class="date-filter">
      <div class="filter-btns">
        <button class="fbtn active" id="fb-today" onclick="setPreset('today')">Aaj</button>
        <button class="fbtn" id="fb-week" onclick="setPreset('week')">7 Din</button>
        <button class="fbtn" id="fb-month" onclick="setPreset('month')">Ye Mahina</button>
        <button class="fbtn" id="fb-custom" onclick="setPreset('custom')">Custom</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0">
        <button class="sbranch-btn fbtn active" data-b="ALL" onclick="setSalesBranch('ALL')">All</button>
        ${branchList.map(b=>`<button class="sbranch-btn fbtn" data-b="${b}" onclick="setSalesBranch('${b}')">${b}</button>`).join('')}
      </div>
      <div id="custom-dates" style="display:none">
        <label>From</label>
        <input type="date" id="date-from" value="${mStart}">
        <label>To</label>
        <input type="date" id="date-to" value="${today}">
      </div>
      <button class="apply-btn" onclick="applySalesFilter()">🔍 Show Results</button>
    </div>
    <div id="sales-summary"></div>
    <div id="sales-list"></div>
  `;

  // Default: aaj
  applySalesFilter();
}

let currentPreset = 'today';
function setPreset(p) {
  currentPreset = p;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('fb-'+p)?.classList.add('active');
  document.getElementById('custom-dates').style.display = p==='custom'?'block':'none';
}

function applySalesFilter() {
  const today = todayStr();
  let from, to;
  if (currentPreset==='today') { from=today; to=today; }
  else if (currentPreset==='week') { from=daysAgoStr(6); to=today; }
  else if (currentPreset==='month') { from=monthStartStr(); to=today; }
  else {
    from = document.getElementById('date-from')?.value || monthStartStr();
    to   = document.getElementById('date-to')?.value   || today;
  }

  const filtered = allSalesData.filter(r => r.date >= from && r.date <= to && (activeSalesBranch==='ALL' || r.branch_name===activeSalesBranch));

  // Summary
  const totalSales  = filtered.reduce((s,r)=>s+(r.total_sales||0),0);
  const totalProfit = filtered.reduce((s,r)=>s+(r.total_profit||0),0);
  const totalInv    = filtered.reduce((s,r)=>s+(r.invoice_count||0),0);
  const totalRet    = filtered.reduce((s,r)=>s+(r.total_returns||0),0);
  const totalRSale  = filtered.reduce((s,r)=>s+(r.retail_sales||0),0);
  const totalRRet   = filtered.reduce((s,r)=>s+(r.retail_returns||0),0);
  const totalRProf  = filtered.reduce((s,r)=>s+(r.retail_profit||0),0);
  const totalWsSale = filtered.reduce((s,r)=>s+(r.ws_sales||0),0);
  const totalWsRet  = filtered.reduce((s,r)=>s+(r.ws_returns||0),0);
  const totalWsProf = filtered.reduce((s,r)=>s+(r.ws_profit||0),0);

  document.getElementById('sales-summary').innerHTML =
    '<div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px">'
    +'<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">&#128Ÿ&#129Ÿ RETAIL</div>'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:10px">'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Sale</div><div style="color:#60a5fa;font-weight:700">'+Rs(totalRSale+totalRRet)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Returns</div><div style="color:#f87171;font-weight:700">'+Rs(totalRRet)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Net</div><div style="color:#34d399;font-weight:700">'+Rs(totalRSale)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Profit</div><div style="color:#34d399;font-weight:700">'+Rs(totalRProf)+'</div></div>'
    +'</div>'
    +'<div style="font-size:11px;color:#94a3b8;margin-bottom:6px">&#127981; WHOLESALE</div>'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:10px">'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Sale</div><div style="color:#60a5fa;font-weight:700">'+Rs(totalWsSale+totalWsRet)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Returns</div><div style="color:#f87171;font-weight:700">'+Rs(totalWsRet)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Net</div><div style="color:#34d399;font-weight:700">'+Rs(totalWsSale)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Profit</div><div style="color:#34d399;font-weight:700">'+Rs(totalWsProf)+'</div></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;border-top:1px solid #334155;padding-top:8px">'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Total Net</div><div style="color:#60a5fa;font-weight:700">'+Rs(totalSales)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Total Profit</div><div style="color:#34d399;font-weight:700">'+Rs(totalProfit)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:#64748b">Invoices</div><div style="font-weight:700">'+totalInv+'</div></div>'
    +'</div>'
    +'</div>';

  // Group by date
  const byDate = {};
  filtered.forEach(r => {
    if (!byDate[r.date]) byDate[r.date]=[];
    byDate[r.date].push(r);
  });
  const dates = Object.keys(byDate).sort().reverse();

  if (!dates.length) {
    document.getElementById('sales-list').innerHTML = '<div class="loading">Is period mein koi sale nahi</div>';
    return;
  }

  document.getElementById('sales-list').innerHTML = dates.map(date => {
    const rows = byDate[date];
    const tot  = rows.reduce((s,r)=>s+(r.total_sales||0),0);
    const prof = rows.reduce((s,r)=>s+(r.total_profit||0),0);
    const inv  = rows.reduce((s,r)=>s+(r.invoice_count||0),0);
    const rSale = rows.reduce((s,r)=>s+(r.retail_sales||0),0);
    const rRet  = rows.reduce((s,r)=>s+(r.retail_returns||0),0);
    const rProf = rows.reduce((s,r)=>s+(r.retail_profit||0),0);
    const wsSale= rows.reduce((s,r)=>s+(r.ws_sales||0),0);
    const wsRet = rows.reduce((s,r)=>s+(r.ws_returns||0),0);
    const wsProf= rows.reduce((s,r)=>s+(r.ws_profit||0),0);
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-weight:600">${date}</span>
          <span class="badge badge-green">${inv} invoices</span>
        </div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">🛍 RETAIL</div>
        <div class="grid-3" style="margin-bottom:8px">
          <div><div class="card-title">Sale</div><div style="color:#60a5fa;font-weight:600">${Rs(rSale+rRet)}</div></div>
          <div><div class="card-title">Returns</div><div class="loss" style="font-weight:600">${Rs(rRet)}</div></div>
          <div><div class="card-title">Net</div><div style="color:#34d399;font-weight:600">${Rs(rSale)}</div></div>
        </div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:4px">🏭 WHOLESALE</div>
        <div class="grid-3" style="margin-bottom:8px">
          <div><div class="card-title">Sale</div><div style="color:#60a5fa;font-weight:600">${Rs(wsSale+wsRet)}</div></div>
          <div><div class="card-title">Returns</div><div class="loss" style="font-weight:600">${Rs(wsRet)}</div></div>
          <div><div class="card-title">Net</div><div style="color:#34d399;font-weight:600">${Rs(wsSale)}</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;background:#0f172a;border-radius:8px;padding:8px">
          <div style="text-align:center"><div style="font-size:11px;color:#64748b">Total Net</div><div style="color:#60a5fa;font-weight:700">${Rs(tot)}</div></div>
          <div style="text-align:center"><div style="font-size:11px;color:#64748b">Profit</div><div class="profit" style="font-weight:700">${Rs(prof)}</div></div>
        </div>
      </div>`;
  }).join('');
}

async function loadStock() {
  const el = document.getElementById("tab-stock");
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch("/api/admin/stock");
    const branches = [...new Set(data.map(r=>r.branch_name))];
    let activeBranch = branches[0]||"";

    function getStockItems(branch) {
      return data.filter(r=>r.branch_name===branch);
    }
    function stockTotalHtml(items) {
      var tp = items.reduce(function(s,r){return s+(r.stock||0);},0);
      var tv = items.reduce(function(s,r){return s+(r.stock||0)*(r.purchase||r.value_at_cost||0);},0);
      return '<div style="display:flex;justify-content:space-between;background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px">'
        +'<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">Total Pairs</div><div style="color:#60a5fa;font-weight:700;font-size:22px">'+tp+'</div></div>'
        +'<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">Total Value</div><div style="color:#34d399;font-weight:700;font-size:22px">'+Rs(tv)+'</div></div>'
        +'</div>';
    }
    function stockTableHtml(items) {
      if (!items.length) return '<div class="loading">Koi item nahi</div>';
      var rows = "";
      items.forEach(function(r) {
        var badge = r.stock<5?"badge-red":r.stock<20?"badge-yellow":"badge-green";
        rows += '<tr><td><div style="font-weight:500">'+r.name+'</div><div style="font-size:11px;color:#64748b">'+(r.brand||"")+' | '+(r.category||"")+'</div></td>'
              +'<td><span class="badge '+badge+'">'+r.stock+'</span></td>'
              +'<td>'+Rs(r.price)+'</td></tr>';
      });
      return '<table class="table"><tr><th>Item</th><th>Stock</th><th>Price</th></tr>'+rows+'</table>';
    }
    function stockFullRender() {
      var items = getStockItems(activeBranch);
      var btnHtml = branches.map(function(b){
        return '<button class="branch-btn'+(b===activeBranch?' active':'')+'" onclick="stockBranchSwitch(\''+ b +'\')">'+b+'</button>';
      }).join("");
      el.innerHTML = '<div class="section-title">Stock</div>'
        +'<div id="stock-branch-btns" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+btnHtml+'</div>'
        +'<div id="stock-total-div">'+stockTotalHtml(items)+'</div>'
        +'<input class="search-bar" placeholder="Search..." oninput="stockSearchFn(this.value)">'
        +'<div id="stock-items-div">'+stockTableHtml(items)+'</div>';
    }
    window.stockBranchSwitch = function(b) {
      activeBranch = b;
      document.querySelectorAll("#stock-branch-btns .branch-btn").forEach(function(btn){
        btn.classList.toggle("active", btn.textContent===b);
      });
      var items = getStockItems(b);
      document.getElementById("stock-total-div").innerHTML = stockTotalHtml(items);
      document.getElementById("stock-items-div").innerHTML = stockTableHtml(items);
    };
    window.stockSearchFn = function(q) {
      var items = data.filter(function(r){
        return r.branch_name===activeBranch &&
          (r.name.toLowerCase().indexOf(q.toLowerCase())>-1 ||
           (r.brand||"").toLowerCase().indexOf(q.toLowerCase())>-1);
      });
      document.getElementById("stock-total-div").innerHTML = stockTotalHtml(items);
      document.getElementById("stock-items-div").innerHTML = stockTableHtml(items);
    };
    stockFullRender();
  } catch(e) {
    el.innerHTML = '<div class="error">'+e.message+'</div>';
  }
}

async function loadOrders() {
  const el = document.getElementById('tab-orders');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch('/api/orders/list');
    el.innerHTML = `
      <div class="section-title">🌐 Web Orders (${data.length})</div>
      ${data.map(r=>`
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;color:#94a3b8">${r.order_no}</span>
            <span class="badge ${r.status==='Delivered'?'badge-green':r.status==='Pending'?'badge-yellow':'badge-red'}">${r.status}</span>
          </div>
          <div style="font-weight:600;margin:6px 0">${r.customer_name||'--'}</div>
          <div style="font-size:13px;color:#94a3b8">${r.customer_phone||''} | ${r.city||''}</div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <span style="color:#60a5fa;font-weight:600">${Rs(r.total)}</span>
            <span style="font-size:12px;color:#64748b">${r.payment_method||'COD'}</span>
          </div>
        </div>
      `).join('')}
    `;
  } catch(e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}
</script>
